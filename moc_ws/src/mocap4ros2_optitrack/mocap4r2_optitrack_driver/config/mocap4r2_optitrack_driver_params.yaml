mocap4r2_optitrack_driver_node:
  ros__parameters:
    connection_type: "Multicast" # Change from Unicast to Multicast
    server_address: "192.168.0.4" # Change to your Motive IP
    local_address: "192.168.0.60" # Your ROS computer IP (same network)
    multicast_address: "239.255.42.99" # Keep this default
    server_command_port: 1510 # Keep default
    server_data_port: 1511 # Keep default
    rigid_body_name: "sub5" # Change from "ground" to "sub5"
    lastFrameNumber: 0
    frameCount: 0
    droppedFrameCount: 0
    n_markers: 0
    n_unlabeled_markers: 0
    qos_history_policy: "keep_all"
    qos_reliability_policy: "best_effort"
    qos_depth: 10
