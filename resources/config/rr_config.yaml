cable_plan_executor:
  ros__parameters:
    # plan_filepath: "resources/data/s2_m2.json"
    # plan_filepath: "resources/data/s5_m3.json"
    # plan_filepath: "resources/data/s6_m2.json"
    plan_filepath: "resources/data/s6_m3.json"
    skip_hitches: False
    action_server_timeout: 5.0

cable_action_planner:
  ros__parameters:
    n_threads: 4
    server_timeout: 5.0
    tf_timeout: 10.0
    move_last_wp_fallback_scale_default: 2.0
    move_last_wp_fallback_scale_step: 0.5
    move_last_wp_fallback_scale_max: 0.5
    move_last_wp_fallback_attempts_max: 5
    hitch_circle_fallback_default: 0.5
    hitch_circle_fallback_step: 0.1
    hitch_circle_fallback_max_attempts: 5
    hitch_move_away_fallback_scale_default: 4.0
    hitch_move_away_fallback_scale_step: 0.5
    hitch_move_away_fallback_scale_max: 1.0
    hitch_move_away_fallback_attempts_max: 10

path_planner:
  ros__parameters:
    map_yaml_filepath: "resources/maps/rr_s2.yaml"
    # map_yaml_filepath: "resources/maps/rr_s5.yaml"
    # map_yaml_filepath: "resources/maps/rr_s6.yaml"
    tf_timeout: 10.0
    inter_robot_collision_check_factor: 2.6
    image_coords_scale: 100.0
    robot_push_scale_default: 1.0
    robot_push_scale_step: 0.1
    robot_push_scale_max_attempts: 20
    boundary_push_scale_default: 1.0
    boundary_push_scale_step: 0.1
    boundary_push_scale_max_attempts: 3
    obstacle_push_scale_default: 1.0
    obstacle_push_scale_step: 0.5
    obstacle_push_scale_max_attempts: 3

map_server:
  ros__parameters:
    yaml_filename: "resources/maps/rr_s2.yaml"
    # yaml_filename: "resources/maps/rr_s5.yaml"
    # yaml_filename: "resources/maps/rr_s6.yaml"
    frame_id: "map"

/**:
  ros__parameters:
    target_frame: "map"
    robot_radius: 0.15
    robot_height: 0.05
    robot_color: [0.1, 0.4, 1.0, 1.0]
    selected_robot_color: [1.0, 0.4, 0.1, 1.0]
    control_frequency: 20
    # pid_linear_gains: [0.8, 0.0, 0.08]
    # pid_rotational_gains: [0.6, 0.0, 0.06]
    d_epsilon: 0.1
    angle_epsilon: 0.6
    lookahead_distance: 0.3
    max_linear_vel: 0.5
    max_rotational_vel: 0.6
    lookahead_distance: 0.3
    n_spline_samples: 100
    lookahead_search_ahead: 1.0
    lookahead_search_behind: 0.2
    collision_radius: 0.6
    collision_break_factor: 0.76
